<!DOCTYPE html>
<html>
<head>
  <title>Admin - Orders</title>
</head>
<body>
<h1>📊 Orders List</h1>
<table border="1">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Product</th>
      <th>Quantity</th>
    </tr>
  </thead>
  <tbody id="tableData"></tbody>
</table>
<script>
fetch("http://localhost:3000/orders")
.then(res => res.json())
.then(data => {
  let rows = "";
  data.forEach(order => {
    rows += `
      <tr>
        <td>${order.name}</td>
        <td>${order.email}</td>
        <td>${order.product}</td>
        <td>${order.quantity}</td>
      </tr>
    `;
  });
  document.getElementById("tableData").innerHTML = rows;
});
</script>
</body>
</html>
:::
